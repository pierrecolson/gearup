name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

# Serialize deploys — never two builds racing against the same VPS.
concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          # `script_stop: true` makes the action fail on the first non-zero exit
          # so a broken build surfaces red, not green.
          script_stop: true
          script: bash /usr/local/bin/gearup-deploy.sh
