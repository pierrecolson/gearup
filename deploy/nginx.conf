# /etc/nginx/sites-available/gearup.conf
#
# Reverse proxy in front of `next start` (port 3000). Replace <DOMAIN> with
# your real hostname before linking + reloading. `certbot --nginx -d <DOMAIN>`
# will append the HTTPS server block and the 80→443 redirect automatically.

server {
    listen 80;
    listen [::]:80;
    server_name <DOMAIN>;

    # Receipts upload limit — matches /api/uploads/route.ts MAX_BYTES.
    client_max_body_size 12M;

    # Forwarded headers so the in-app rate limiter sees the real client IP.
    # `clientIp()` in src/lib/auth.ts reads X-Forwarded-For / X-Real-IP.
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket upgrade — harmless when unused; required for Next dev
        # mode and some streaming APIs.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 60s;
        proxy_cache_bypass $http_upgrade;
    }
}
